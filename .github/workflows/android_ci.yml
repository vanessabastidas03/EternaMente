name: EternaMente CI

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ develop ]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Debug build (siempre activo, no requiere secrets)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Dar permiso a gradlew
        run: chmod +x gradlew

      # google-services.json está en .gitignore (contiene datos reales en local).
      # En CI se genera un fichero falso solo para que el plugin google-services
      # pueda procesar el manifest sin credenciales reales.
      - name: Crear google-services.json falso
        run: |
          mkdir -p app
          cat > app/google-services.json <<EOF
          {
            "project_info": {
              "project_number": "123456789",
              "project_id": "fake-project",
              "storage_bucket": "fake-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:abcdef123456",
                  "android_client_info": {
                    "package_name": "com.eternamente.app"
                  }
                },
                "api_key": [
                  {
                    "current_key": "fake-api-key"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Ejecutar Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Release build firmada (OPCIONAL — requiere secrets configurados)
#
# Para activar este job:
#   1. Crear un keystore de release (ver docs/github_secrets.md).
#   2. Codificar el keystore en Base64:
#        base64 -i release.jks | tr -d '\n' > keystore_b64.txt
#   3. Copiar el contenido y agregarlo como secret KEYSTORE_BASE64 en GitHub.
#   4. Agregar los demás secrets (ver docs/github_secrets.md).
#   5. Descomentar el bloque de abajo y hacer push.
#
# Secrets requeridos:
#   KEYSTORE_BASE64     — keystore codificado en Base64
#   KEYSTORE_PASSWORD   — contraseña del archivo .jks
#   KEY_ALIAS           — alias de la clave dentro del keystore
#   KEY_PASSWORD        — contraseña de la clave
#   FIREBASE_APP_ID     — App ID de Firebase App Distribution (opcional)
